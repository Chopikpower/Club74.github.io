<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Игроки — Клуб Чпокеристов</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
    :root {
        --primary-color: #00bfff;
        --secondary-color: #1a3a5c;
        --bg-color: #0a0e1a;
        --card-bg: #1a2332;
        --text-color: #ffffff;
        --text-muted: #8b92a8;
        --border-color: #2a3447;
        --success-color: #00bfff;
        --warning-color: #ffa500;
        --danger-color: #ff4757;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: var(--bg-color);
        color: var(--text-color);
        min-height: 100vh;
        font-size: clamp(14px, 1vw, 16px);
    }

    .header {
        background: var(--card-bg);
        padding: clamp(10px, 2vw, 15px) clamp(15px, 3vw, 30px);
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 2px solid var(--primary-color);
        flex-wrap: wrap;
        gap: 10px;
    }

    .logo { font-size: clamp(18px, 2.5vw, 24px); font-weight: bold; color: var(--primary-color); }

    .user-info { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }

    .user-role { background: var(--secondary-color); padding: 5px 15px; border-radius: 20px; font-size: 14px; }

    .btn {
        padding: 12px 24px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        transition: all 0.3s;
        text-decoration: none;
        display: inline-block;
        user-select: none;
    }

    .btn-primary { background: var(--primary-color); color: white; }
    .btn-primary:hover { background: #0099cc; transform: translateY(-2px); }
    .btn-secondary { background: var(--secondary-color); color: white; }
    .btn-secondary:hover { background: #2a4a6c; }
    .btn-success { background: var(--success-color); color: white; }
    .btn-success:hover { background: #0099cc; }
    .btn-warning { background: var(--warning-color); color: white; }
    .btn-warning:hover { background: #e69500; }
    .btn-danger { background: var(--danger-color); color: white; }
    .btn-danger:hover { background: #ff3344; }
    .btn-small { padding: 6px 12px; font-size: 12px; }

    #leagueBtn {
        background: linear-gradient(135deg, #CBA135, #8a6a1f);
        color: #12251D;
        font-weight: 800;
        border: 1px solid rgba(203, 161, 53, 0.8);
        box-shadow: 0 0 14px rgba(203, 161, 53, 0.25);
    }
    #leagueBtn:hover {
        background: linear-gradient(135deg, #e0b84a, #CBA135);
        transform: translateY(-2px);
        box-shadow: 0 0 22px rgba(203, 161, 53, 0.45);
    }

    .container { max-width: 1100px; margin: 0 auto; padding: clamp(15px, 3vw, 30px) clamp(15px, 2vw, 20px); }

    .players-card {
        background: var(--card-bg);
        border-radius: 15px;
        padding: clamp(20px, 4vw, 35px) clamp(20px, 3vw, 30px);
        margin: 20px 0;
        border: 2px solid var(--primary-color);
        box-shadow: 0 0 30px rgba(0, 191, 255, 0.15);
    }

    .players-card h1 {
        color: var(--primary-color);
        font-size: clamp(20px, 3vw, 28px);
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 15px;
    }

    .form-group { margin: 15px 0; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: var(--text-muted); }
    .form-group input {
        width: 100%;
        padding: 10px;
        background: var(--bg-color);
        border: 1px solid var(--border-color);
        border-radius: 6px;
        color: var(--text-color);
        font-size: 14px;
    }
    .form-group input:focus { outline: none; border-color: var(--primary-color); }
    .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }

    table { width: 100%; border-collapse: collapse; margin: 20px 0; }
    table th, table td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border-color); }
    table th { background: var(--secondary-color); font-weight: 600; color: var(--primary-color); white-space: nowrap; }
    table tr:hover { background: rgba(0, 191, 255, 0.05); }
    table td.num { color: var(--warning-color); font-weight: 600; }
    .lock-note { color: var(--text-muted); font-size: 12px; font-weight: normal; }
    .empty-state { text-align: center; padding: 30px; color: var(--text-muted); }
    .table-wrap { overflow-x: auto; }

    .modal {
        display: none;
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.8);
        z-index: 1000;
        justify-content: center;
        align-items: center;
    }
    .modal.active { display: flex; }
    .modal-content {
        background: var(--card-bg);
        padding: 30px;
        border-radius: 10px;
        max-width: 480px;
        width: 90%;
        border: 2px solid var(--primary-color);
        max-height: 80vh;
        overflow-y: auto;
    }
    .modal-header { font-size: 20px; font-weight: bold; margin-bottom: 20px; color: var(--primary-color); }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; flex-wrap: wrap; }

    @media (max-width: 640px) {
        table th, table td { padding: 8px; font-size: 13px; }
        .modal-actions { justify-content: stretch; }
        .modal-actions .btn { flex: 1; }
    }
</style>
</head>
<body>

<div class="header">
    <div class="logo">🃏 Poker Timer</div>
    <div class="user-info">
        <span class="user-role" id="userRole"> </span>
        <button class="btn btn-secondary" onclick="window.location.href='index.html'">Вернуться</button>
        <button class="btn" id="leagueBtn" onclick="window.location.href='League.html'">♠ Лига 4покеристов</button>
        <button class="btn btn-primary" id="loginBtn">Вход</button>
        <button class="btn btn-secondary" id="logoutBtn" style="display:none;">Выход</button>
    </div>
</div>

<div class="container">
    <div class="players-card">
        <h1>
            👥 Игроки клуба
            <button class="btn btn-success" id="openRegisterBtn">📝 Регистрация</button>
        </h1>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Имя</th>
                        <th>Очки</th>
                        <th>Кубки</th>
                        <th id="phoneHeader" style="display:none;">Сотовый</th>
                        <th id="actionsHeader" style="display:none;">Действия</th>
                    </tr>
                </thead>
                <tbody id="playersBody"></tbody>
            </table>
            <div class="empty-state" id="emptyState" style="display:none;">Пока никто не зарегистрирован. Будьте первым!</div>
        </div>
    </div>
</div>

<!-- Agreement modal (shown first) -->
<div class="modal" id="agreementModal">
    <div class="modal-content">
        <div class="modal-header">📄 Соглашение участника</div>
        <div id="agreementTextView" style="color:var(--text-color); line-height:1.6; white-space:pre-wrap;"></div>
        <textarea id="agreementTextEdit" style="display:none; width:100%; min-height:160px; margin-top:10px; padding:10px; background:var(--bg-color); border:1px solid var(--border-color); border-radius:6px; color:var(--text-color); font-family:inherit; font-size:14px;"></textarea>
        <div class="form-group" id="agreeCheckboxWrap" style="display:flex; align-items:center; gap:10px; margin-top:20px;">
            <input type="checkbox" id="agreeCheckbox" style="width:auto;">
            <label for="agreeCheckbox" style="margin:0; color:var(--text-color); cursor:pointer;">Я принимаю условия соглашения</label>
        </div>
        <div class="modal-actions">
            <button class="btn btn-secondary" id="editAgreementBtn" style="display:none;">✏️ Редактировать текст</button>
            <button class="btn btn-primary" id="saveAgreementBtn" style="display:none;">💾 Сохранить текст</button>
            <button class="btn btn-secondary" id="cancelAgreementBtn">Отмена</button>
            <button class="btn btn-success" id="agreeContinueBtn" disabled>Далее →</button>
        </div>
    </div>
</div>

<!-- Registration modal -->
<div class="modal" id="registerModal">
    <div class="modal-content">
        <div class="modal-header">📝 Регистрация игрока</div>
        <div class="form-group">
            <label>Имя</label>
            <input type="text" id="regName" placeholder="Введите имя">
        </div>
        <div class="form-group">
            <label>Сотовый номер</label>
            <input type="tel" id="regPhone" placeholder="+7 900 000-00-00">
        </div>
        <div class="form-row" id="regAdminFields" style="display:none;">
            <div class="form-group">
                <label>Очки</label>
                <input type="number" id="regPoints" value="0" min="0">
            </div>
            <div class="form-group">
                <label>Кубки</label>
                <input type="number" id="regCups" value="0" min="0">
            </div>
        </div>
        <div class="modal-actions">
            <button class="btn btn-secondary" id="cancelRegisterBtn">Отмена</button>
            <button class="btn btn-success" id="submitRegisterBtn">✅ Зарегистрироваться</button>
        </div>
    </div>
</div>

<!-- Login modal -->
<div class="modal" id="loginModal">
    <div class="modal-content" style="max-width:400px;">
        <div class="modal-header">🔐 Вход</div>
        <div class="form-group">
            <label>Пароль</label>
            <input type="password" id="adminPasswordInput" placeholder="Введите пароль">
        </div>
        <div class="modal-actions">
            <button class="btn btn-secondary" id="cancelLoginBtn">Отмена</button>
            <button class="btn btn-primary" id="confirmLoginBtn">Войти</button>
        </div>
    </div>
</div>

<!-- Edit modal (admin only) -->
<div class="modal" id="editModal">
    <div class="modal-content">
        <div class="modal-header">✏️ Редактировать игрока</div>
        <div class="form-group">
            <label>Имя</label>
            <input type="text" id="editName">
        </div>
        <div class="form-group">
            <label>Сотовый номер</label>
            <input type="tel" id="editPhone">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Очки</label>
                <input type="number" id="editPoints" min="0">
            </div>
            <div class="form-group">
                <label>Кубки</label>
                <input type="number" id="editCups" min="0">
            </div>
        </div>
        <div class="modal-actions">
            <button class="btn btn-danger" id="deletePlayerBtn">🗑 Удалить</button>
            <button class="btn btn-secondary" id="cancelEditBtn">Отмена</button>
            <button class="btn btn-primary" id="saveEditBtn">💾 Сохранить</button>
        </div>
    </div>
</div>

<script>
/************************************************************
 * SUPABASE (тот же проект, что и в app.js)
 ************************************************************/
const SUPABASE_URL = 'https://ivvzrjnutuyoqtlzpbqx.supabase.co';
const SUPABASE_KEY = 'sb_publishable_yazZ-oVnnAzq4zci1mlRZQ_7XxA2Np-';

let supabaseClient = null;
let players = [];
let isAdmin = localStorage.getItem('pokerTimerIsAdmin') === 'true';
let adminPassword = localStorage.getItem('pokerTimerPassword') || 'secret';
let editingId = null;
let agreementAccepted = false;
let guestRegistrationVisible = true;

const DEFAULT_AGREEMENT_TEXT = `Регистрируясь в клубе, я подтверждаю, что:
1. Указанные мной данные (имя и номер телефона) достоверны.
2. Мой номер телефона будет использоваться администрацией клуба только для связи по организационным вопросам и не будет виден другим участникам.
3. Я согласен с правилами проведения турниров клуба.`;
let agreementText = DEFAULT_AGREEMENT_TEXT;

const $ = id => document.getElementById(id);

/************************************************************
 * SUPABASE HELPERS
 ************************************************************/
async function initSupabase() {
    if (!window.supabase || typeof window.supabase.createClient !== 'function') {
        console.warn('Supabase SDK не загрузился');
        return;
    }
    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    await refreshSettingsFromCloud();
    applyRegistrationVisibility();
    await loadAgreementText();
    await loadPlayers();
    subscribeRealtime();
}

async function loadAgreementText() {
    try {
        const { data, error } = await supabaseClient
            .from('app_state')
            .select('value')
            .eq('key', 'players_agreement')
            .maybeSingle();
        if (!error && data && data.value && data.value.text) {
            agreementText = String(data.value.text);
        }
    } catch (e) {
        console.warn('Не удалось получить текст соглашения:', e);
    }
}

async function saveAgreementText(text) {
    try {
        const { error } = await supabaseClient
            .from('app_state')
            .upsert({
                key: 'players_agreement',
                value: { text },
                updated_at: new Date().toISOString()
            });
        if (error) console.error('Ошибка сохранения соглашения:', error);
    } catch (e) {
        console.error('saveAgreementText error:', e);
    }
}

async function refreshSettingsFromCloud() {
    try {
        const { data, error } = await supabaseClient
            .from('app_state')
            .select('value')
            .eq('key', 'settings')
            .maybeSingle();
        if (!error && data && data.value) {
            if (data.value.adminPassword) {
                adminPassword = String(data.value.adminPassword);
                localStorage.setItem('pokerTimerPassword', adminPassword);
            }
            if (typeof data.value.guestRegistrationVisible !== 'undefined') {
                guestRegistrationVisible = data.value.guestRegistrationVisible !== false;
            }
        }
    } catch (e) {
        console.warn('Не удалось получить пароль из облака:', e);
    }
}

async function loadPlayers() {
    try {
        const { data, error } = await supabaseClient
            .from('app_state')
            .select('value')
            .eq('key', 'players')
            .maybeSingle();
        if (error) {
            console.error('Ошибка чтения игроков:', error);
            return;
        }
        players = (data && Array.isArray(data.value)) ? data.value : [];
        sortPlayers();
        renderTable();
    } catch (e) {
        console.error('loadPlayers error:', e);
    }
}

async function savePlayers() {
    try {
        const { error } = await supabaseClient
            .from('app_state')
            .upsert({
                key: 'players',
                value: players,
                updated_at: new Date().toISOString()
            });
        if (error) console.error('Ошибка записи игроков:', error);
    } catch (e) {
        console.error('savePlayers error:', e);
    }
}

function subscribeRealtime() {
    supabaseClient
        .channel('players_page_state')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'app_state' }, payload => {
            if (!payload.new) return;
            if (payload.new.key === 'players' && Array.isArray(payload.new.value)) {
                players = payload.new.value;
                sortPlayers();
                renderTable();
            }
            if (payload.new.key === 'settings' && payload.new.value) {
                if (payload.new.value.adminPassword) {
                    adminPassword = String(payload.new.value.adminPassword);
                }
                if (typeof payload.new.value.guestRegistrationVisible !== 'undefined') {
                    guestRegistrationVisible = payload.new.value.guestRegistrationVisible !== false;
                    applyRegistrationVisibility();
                }
            }
            if (payload.new.key === 'players_agreement' && payload.new.value && payload.new.value.text) {
                agreementText = String(payload.new.value.text);
            }
        })
        .subscribe();
}

function sortPlayers() {
    players.sort((a, b) => (Number(b.points) || 0) - (Number(a.points) || 0));
}

/************************************************************
 * RENDER
 ************************************************************/
function renderTable() {
    $('phoneHeader').style.display = isAdmin ? '' : 'none';
    $('actionsHeader').style.display = isAdmin ? '' : 'none';

    const body = $('playersBody');
    body.innerHTML = '';

    if (!players.length) {
        $('emptyState').style.display = 'block';
        return;
    }
    $('emptyState').style.display = 'none';

    players.forEach(p => {
        const tr = document.createElement('tr');
        let rowHtml = `
            <td>${escapeHtml(p.name)}</td>
            <td class="num">${Number(p.points) || 0}</td>
            <td class="num">🏆 ${Number(p.cups) || 0}</td>
        `;
        if (isAdmin) {
            rowHtml += `<td>${escapeHtml(p.phone || '—')}</td>`;
            rowHtml += `<td><button class="btn btn-secondary btn-small" onclick="openEditModal('${p.id}')">✏️ Изменить</button></td>`;
        }
        tr.innerHTML = rowHtml;
        body.appendChild(tr);
    });
}

function escapeHtml(str) {
    if (str === undefined || str === null) return '';
    return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function updateAuthUI() {
    $('userRole').textContent = isAdmin ? 'Админ' : 'Гость';
    $('loginBtn').style.display = isAdmin ? 'none' : 'inline-block';
    $('logoutBtn').style.display = isAdmin ? 'inline-block' : 'none';
    applyRegistrationVisibility();
    renderTable();
}

/************************************************************
 * ВИДИМОСТЬ РЕГИСТРАЦИИ
 * Управляется тем же переключателем "Регистрация: Показана/Скрыта",
 * что и на главной странице (index.html). Админ кнопку видит всегда,
 * гостю она показывается только если регистрация не скрыта админом.
 ************************************************************/
function applyRegistrationVisibility() {
    const btn = $('openRegisterBtn');
    if (!btn) return;

    if (isAdmin) {
        btn.style.display = 'inline-block';
        return;
    }

    btn.style.display = guestRegistrationVisible ? 'inline-block' : 'none';

    // Если гость уже открыл соглашение/форму, а админ в этот момент скрыл регистрацию — закрываем модалки.
    if (!guestRegistrationVisible) {
        $('agreementModal').classList.remove('active');
        $('registerModal').classList.remove('active');
    }
}

/************************************************************
 * AGREEMENT (шаг перед регистрацией)
 ************************************************************/
$('openRegisterBtn').onclick = () => {
    openAgreementModal();
};

function openAgreementModal() {
    agreementAccepted = false;
    $('agreeCheckbox').checked = false;
    $('agreeContinueBtn').disabled = true;

    $('agreementTextView').style.display = 'block';
    $('agreementTextEdit').style.display = 'none';
    $('agreementTextView').textContent = agreementText;

    $('editAgreementBtn').style.display = isAdmin ? 'inline-block' : 'none';
    $('saveAgreementBtn').style.display = 'none';

    $('agreementModal').classList.add('active');
}

$('cancelAgreementBtn').onclick = () => $('agreementModal').classList.remove('active');

$('agreeCheckbox').onchange = () => {
    $('agreeContinueBtn').disabled = !$('agreeCheckbox').checked;
};

$('editAgreementBtn').onclick = () => {
    $('agreementTextEdit').value = agreementText;
    $('agreementTextView').style.display = 'none';
    $('agreementTextEdit').style.display = 'block';
    $('editAgreementBtn').style.display = 'none';
    $('saveAgreementBtn').style.display = 'inline-block';
};

$('saveAgreementBtn').onclick = async () => {
    const newText = $('agreementTextEdit').value.trim() || DEFAULT_AGREEMENT_TEXT;
    agreementText = newText;
    $('agreementTextView').textContent = agreementText;
    $('agreementTextView').style.display = 'block';
    $('agreementTextEdit').style.display = 'none';
    $('editAgreementBtn').style.display = 'inline-block';
    $('saveAgreementBtn').style.display = 'none';
    await saveAgreementText(newText);
};

$('agreeContinueBtn').onclick = () => {
    if (!$('agreeCheckbox').checked) return;
    agreementAccepted = true;
    $('agreementModal').classList.remove('active');
    openRegisterForm();
};

/************************************************************
 * REGISTRATION (доступно гостям, только после принятия соглашения)
 ************************************************************/
function openRegisterForm() {
    if (!agreementAccepted) {
        openAgreementModal();
        return;
    }
    $('regName').value = '';
    $('regPhone').value = '';
    $('regPoints').value = 0;
    $('regCups').value = 0;
    $('regAdminFields').style.display = isAdmin ? 'grid' : 'none';
    $('registerModal').classList.add('active');
}

$('cancelRegisterBtn').onclick = () => $('registerModal').classList.remove('active');

$('submitRegisterBtn').onclick = async () => {
    const name = $('regName').value.trim();
    const phone = $('regPhone').value.trim();
    // Очки и кубки при регистрации задаёт только админ, гость всегда начинает с 0.
    const points = isAdmin ? (parseInt($('regPoints').value, 10) || 0) : 0;
    const cups = isAdmin ? (parseInt($('regCups').value, 10) || 0) : 0;

    if (!name) { alert('Введите имя'); return; }
    if (!phone) { alert('Введите сотовый номер'); return; }

    const newPlayer = {
        id: (crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random().toString(16).slice(2)),
        name, phone, points, cups,
        created_at: new Date().toISOString()
    };

    players.push(newPlayer);
    sortPlayers();
    renderTable();
    $('registerModal').classList.remove('active');
    agreementAccepted = false;

    await savePlayers();
};

/************************************************************
 * LOGIN / LOGOUT
 ************************************************************/
$('loginBtn').onclick = async () => {
    await refreshSettingsFromCloud();
    $('adminPasswordInput').value = '';
    $('loginModal').classList.add('active');
};

$('cancelLoginBtn').onclick = () => $('loginModal').classList.remove('active');

$('confirmLoginBtn').onclick = () => {
    const entered = $('adminPasswordInput').value;
    if (entered === adminPassword) {
        isAdmin = true;
        localStorage.setItem('pokerTimerIsAdmin', 'true');
        $('loginModal').classList.remove('active');
        updateAuthUI();
    } else {
        alert('Неверный пароль');
    }
};

$('logoutBtn').onclick = () => {
    isAdmin = false;
    localStorage.setItem('pokerTimerIsAdmin', 'false');
    updateAuthUI();
};

/************************************************************
 * EDIT / DELETE (только админ)
 ************************************************************/
function openEditModal(id) {
    if (!isAdmin) return;
    const p = players.find(pl => pl.id === id);
    if (!p) return;
    editingId = id;
    $('editName').value = p.name || '';
    $('editPhone').value = p.phone || '';
    $('editPoints').value = Number(p.points) || 0;
    $('editCups').value = Number(p.cups) || 0;
    $('editModal').classList.add('active');
}
window.openEditModal = openEditModal;

$('cancelEditBtn').onclick = () => $('editModal').classList.remove('active');

$('saveEditBtn').onclick = async () => {
    const p = players.find(pl => pl.id === editingId);
    if (!p) return;
    const name = $('editName').value.trim();
    if (!name) { alert('Введите имя'); return; }

    p.name = name;
    p.phone = $('editPhone').value.trim();
    p.points = parseInt($('editPoints').value, 10) || 0;
    p.cups = parseInt($('editCups').value, 10) || 0;

    sortPlayers();
    renderTable();
    $('editModal').classList.remove('active');
    await savePlayers();
};

$('deletePlayerBtn').onclick = async () => {
    if (!confirm('Удалить этого игрока?')) return;
    players = players.filter(pl => pl.id !== editingId);
    renderTable();
    $('editModal').classList.remove('active');
    await savePlayers();
};

 ************************************************************/
updateAuthUI();
initSupabase();
</script>
